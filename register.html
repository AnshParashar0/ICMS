<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICMS - Register</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100">
            <div class="col-md-6 col-lg-4 mx-auto">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">
                                <i class="bi bi-person-plus"></i> Register
                            </h2>
                            <p class="text-muted">Create your ICMS account</p>
                        </div>
                        
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">
                                    <i class="bi bi-person"></i> Full Name
                                </label>
                                <input type="text" class="form-control form-control-lg" id="fullName" 
                                       placeholder="Enter your full name" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope"></i> Email Address
                                </label>
                                <input type="email" class="form-control form-control-lg" id="email" 
                                       placeholder="Enter your email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="bi bi-lock"></i> Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="password" 
                                       placeholder="Enter your password" required>
                                <div class="form-text">Password must be at least 6 characters</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label">
                                    <i class="bi bi-lock-fill"></i> Confirm Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="confirmPassword" 
                                       placeholder="Confirm your password" required>
                            </div>
                            
                            <div class="mb-3">
                                <select class="form-select form-select-lg" id="userType" required>
                                    <option value="">Select User Type</option>
                                    <option value="student">Student</option>
                                </select>
                            </div>
                            
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-person-check"></i> Register
                                </button>
                            </div>
                            
                            <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                                <i class="bi bi-exclamation-triangle"></i> <span id="errorText"></span>
                            </div>
                            
                            <div id="successMessage" class="alert alert-success d-none" role="alert">
                                <i class="bi bi-check-circle"></i> Registration successful! Redirecting to login...
                            </div>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="mb-0">Already have an account? 
                                <a href="index.html" class="text-primary text-decoration-none">
                                    Login here
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
