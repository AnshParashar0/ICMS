# Server Configuration
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${MYSQL_PUBLIC_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS Configuration (read by SecurityConfig.corsConfigurationSource)
# Set CORS_ORIGINS env var to your frontend URL e.g. https://your-app.vercel.app
cors.allowed-origins=${CORS_ORIGINS:*}

# Fix circular dependency
spring.main.allow-circular-references=true

# Email Configuration
resend.api.key=${RESEND_API_KEY}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=uploads/complaints